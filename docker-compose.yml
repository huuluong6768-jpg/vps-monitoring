# ==============================================================================
# VPS Monitor — Docker Compose
#
# Quick start:
#   cp .env.example .env     # edit JWT_SECRET, etc.
#   docker compose up -d
#
# Services:
#   mongo  — MongoDB 7 (data persisted in volume)
#   api    — Express API server (port 4000)
#   web    — Next.js Web UI (port 3000)
#
# Coolify: import this repo → Coolify auto-detects docker-compose.yml
# ==============================================================================

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/vps-monitoring}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      API_PORT: ${API_PORT:-4000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      WEB_ORIGINS: ${WEB_ORIGINS:-http://localhost:3000,http://web:3000}
      AGENT_OFFLINE_AFTER_SECONDS: ${AGENT_OFFLINE_AFTER_SECONDS:-60}
    ports:
      - "${API_PORT:-4000}:4000"

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      API_URL: http://api:4000
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      AGENT_OFFLINE_AFTER_SECONDS: ${AGENT_OFFLINE_AFTER_SECONDS:-60}
    ports:
      - "${PORT:-3000}:3000"

volumes:
  mongo_data:
